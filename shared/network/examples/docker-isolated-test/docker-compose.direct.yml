# Docker Compose for direct-connection model sharing test (single sharer).
#
# Same setup as docker-compose.yml but sharer and downloaders share a single
# network, so holepunching succeeds and data flows via direct UDP connections.
#
# For multi-sharer tests, use run.sh --direct instead.
#
# Usage:
#   docker compose -f shared/network/examples/docker-isolated-test/docker-compose.direct.yml up --build

services:
  sharer:
    build:
      context: ../../../..
      dockerfile: shared/network/examples/docker-isolated-test/Dockerfile
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        model_sharing_test --mode=sharer \
          --sharer-id=0 \
          --num-parameters=${NUM_PARAMS:-10} \
          --parameter-size-mb=${PARAM_SIZE_MB:-200} \
          --discovery-mode=${DISCOVERY_MODE:-n0} \
          --relay-kind=${RELAY_KIND:-psyche} &
        PID=$$!
        while [ ! -f /tmp/sharer_addr_0.json ]; do sleep 0.5; done
        cp /tmp/sharer_addr_0.json /shared/sharer_addr_0.json
        wait $$PID
    volumes:
      - sharer-addr:/shared
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    networks:
      - shared-net
    healthcheck:
      test: ['CMD-SHELL', 'test -f /shared/sharer_addr_0.json']
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

  downloader:
    build:
      context: ../../../..
      dockerfile: shared/network/examples/docker-isolated-test/Dockerfile
    command:
      - '--mode=downloader'
      - '--num-downloaders=1'
      - '--num-parameters=${NUM_PARAMS:-10}'
      - '--parameter-size-mb=${PARAM_SIZE_MB:-200}'
      - '--max-concurrent-downloads=${MAX_CONCURRENT:-4}'
      - '--discovery-mode=${DISCOVERY_MODE:-n0}'
      - '--relay-kind=${RELAY_KIND:-psyche}'
      - '--sharer-addr=/shared'
    volumes:
      - sharer-addr:/shared:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    networks:
      - shared-net
    depends_on:
      sharer:
        condition: service_healthy
    deploy:
      replicas: ${NUM_DOWNLOADERS:-5}

volumes:
  sharer-addr:

networks:
  shared-net:
    driver: bridge
