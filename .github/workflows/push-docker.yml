name: Push Client Image

on:
  push:
    branches: [ci-build-and-publish-image]
  workflow_dispatch:

jobs:
  push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
            substituters = https://cache.garnix.io https://cache.nixos.org/
            trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Download image from Garnix cache
        run: |
          nix build .#docker-psyche-solana-test-client --no-link --print-out-paths > image-path.txt

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ignacioavecilla
          password: ${{ secrets.DOCKER_TEST_KEY }}
      - run: scripts/push-client-image.sh
        env:
          DOCKER_TEST_KEY: ${{ secrets.DOCKER_TEST_KEY }}
