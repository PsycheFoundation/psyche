name: Self-hosted runner cleanup

on:
  schedule:
    - cron: '0 7 * * *'

jobs:
  cleanup:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Docker cleanup
        run: |
          docker container prune -f
          docker image prune -a -f
          docker volume prune -f
          docker builder prune -a -f

      - name: Nix garbage collection
        run: nix-collect-garbage
