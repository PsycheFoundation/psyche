run_id = "llama2-20m-dolma"
run_state = "WaitingForMembers"
[config]
warmup_time = 30
cooldown_time = 1
epoch_time = 600
max_round_train_time = 30
round_witness_time = 2
min_clients = 2
init_min_clients = 2
global_batch_size_start = 8
global_batch_size_end = 8
global_batch_size_warmup_tokens = 0
verification_percent = 50
witness_nodes = 1
total_steps = 25000
waiting_for_members_extra_time = 3

[model.LLM]
max_seq_len = 2048
cold_start_warmup_steps = 0
checkpoint_source = "Stored"

[model_extra_data]
architecture = "HfLlama"
data_type = "Pretraining"
[model_extra_data.data_location]
Server = "127.0.0.1:20001"
[model_extra_data.lr_schedule.Cosine]
base_lr = 4.0e-4
warmup_steps = 500
warmup_init_lr = 0.0
total_steps = 25000
final_lr = 4.0e-5
[model_extra_data.optimizer.Distro]
compression_decay = 0.999
compression_chunk = 64
compression_topk = 8
quantize_1bit = true

[model_extra_data.checkpoint.Hub]
repo_id = "emozilla/llama2-20m-init"
