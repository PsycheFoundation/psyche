servers:
  - configuration: psyche-http-devnet
    deployment:
      type: on-branch
      branch: test-deploy-devnet

  - configuration: psyche-http-mainnet
    deployment:
      type: on-branch
      branch: test-deploy-mainnet

  - configuration: psyche-http-docs
    deployment:
      type: on-branch
      branch: test-deploy-docs

  - configuration: psyche-http
    deployment:
      type: on-branch
      branch: main
builds:
  - exclude:
      - 'checks.x86_64-linux.workspace-test-all'
      - 'checks.x86_64-linux.workspace-test-decentralized'
      - 'checks.x86_64-linux.workspace-test-parallelism'
    include:
      - 'packages.x86_64-linux.psyche-solana-client'
      - 'packages.x86_64-linux.psyche-centralized-client'
      - 'packages.x86_64-linux.psyche-centralized-server'
      - 'packages.x86_64-linux.docker-psyche-solana-client'
      - 'packages.x86_64-linux.docker-psyche-solana-test-client-no-python'
      - 'packages.x86_64-linux.docker-psyche-solana-test-validator'
      - 'packages.x86_64-linux.docker-psyche-gateway-node'
      - 'packages.x86_64-linux.psyche-centralized-local-testnet'
      - 'packages.x86_64-linux.expand-distro'
      - 'packages.x86_64-linux.solana-coordinator-program'
      - 'packages.x86_64-linux.solana-authorizer-program'
      - 'devShells.x86_64-linux.*'
      - 'nixosConfigurations.*'
      - 'checks.x86_64-linux.*'

  # on main, might as well build everything, though
  - exclude:
      - 'packages.aarch64-darwin.*'
      - 'devShells.aarch64-darwin.*'
    include:
      - 'packages.x86_64-linux.*'
      - 'devShells.x86_64-linux.*'
    branch: main

actions:
  - on: push
    run: solana-test-test_one_clients_three_epochs_run
    withRepoContents: true
  - on: push
    run: solana-test-test_two_clients_three_epochs_run
    withRepoContents: true
  - on: push
    run: solana-test-test_client_join_and_get_model_p2p
    withRepoContents: true
  - on: push
    run: solana-test-disconnect_client
    withRepoContents: true
  - on: push
    run: solana-test-drop_a_client_waitingformembers_then_reconnect
    withRepoContents: true
  - on: push
    run: solana-test-test_when_all_clients_disconnect_checkpoint_is_hub
    withRepoContents: true
  - on: push
    run: solana-test-test_everybody_leaves_in_warmup
    withRepoContents: true
  - on: push
    run: solana-test-test_lost_only_peer_go_back_to_hub_checkpoint
    withRepoContents: true
  - on: push
    run: solana-test-test_pause_and_resume_run
    withRepoContents: true
  - on: push
    run: push-docker-solana-client
  - on: push
    run: push-docker-gateway
